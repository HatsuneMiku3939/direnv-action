name: 'direnv action'
description: 'Provides environment variables via direnv'
branding:
  icon: play
  color: green
inputs:
  masks:
    description: 'Comma-separated list of environment variable names to mask'
    required: true
    default: ''
  required:
    description: 'Newline-delimited list of environment variable names that must be exported'
    required: false
    default: ''
  direnvVersion:
    description: 'direnv version to use'
    required: true
    default: '2.37.1'
  direnvChecksum:
    description: 'Optional SHA-256 checksum for the downloaded direnv binary'
    required: false
    default: ''
  path:
    description: 'Directory where direnv is evaluated'
    required: true
    default: .
runs:
  using: 'node24'
  main: 'dist/index.js'
