name: "check-dirty"
on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  check-dirty:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - run: npm ci
    - run: npm run prepare
    - run: |
        git diff --stat --exit-code
